name: Deploy app to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - index.html
      - contented-baby.html
      - parenting-relationship.html
      - whole-brain.html
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # Publish ONLY the app — nothing else in the repo is served
      - name: Stage site
        run: |
          mkdir _site
          cp index.html contented-baby.html parenting-relationship.html whole-brain.html _site/

      - uses: actions/configure-pages@v5
        with:
          enablement: enabled

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
